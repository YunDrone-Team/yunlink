name: Windows CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Configure
        run: cmake --preset ci-ninja

      - name: Build
        run: python3 tools/build_fast.py --preset ci-ninja

  bindings:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure
        run: cmake --preset ci-ninja

      - name: Build Core Bindings Targets
        run: cmake --build --preset ci-ninja --target yunlink_ffi test_c_ffi_v1 test_c_ffi_contract

      - name: Test FFI Contracts
        run: ctest --test-dir build/ci-ninja -R "test_c_ffi_(v1|contract|loader)" --output-on-failure

      - name: Test Rust Bindings
        run: |
          cargo test -p yunlink --manifest-path bindings/rust/Cargo.toml
          cargo build --examples -p yunlink --manifest-path bindings/rust/Cargo.toml

      - name: Test Python Bindings
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python -m pip install --upgrade pip
          .\.venv\Scripts\python -m pip install -e bindings/python
          .\.venv\Scripts\python -m unittest discover -s bindings/python/tests

      - name: Wheel Smoke
        shell: pwsh
        run: |
          python -m venv .venv-wheel
          .\.venv-wheel\Scripts\python -m pip install --upgrade pip
          .\.venv-wheel\Scripts\python -m pip wheel bindings/python -w output/python-wheel
