name: ci

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install LLVM tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format clang-tidy

      - name: Configure
        run: cmake --preset ci-ninja

      - name: Lint
        run: python3 tools/build_fast.py --preset ci-ninja --target lint

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Configure
        run: cmake --preset ci-ninja

      - name: Build
        run: python3 tools/build_fast.py --preset ci-ninja

      - name: Test (Linux/macOS)
        if: runner.os != 'Windows'
        run: ctest --test-dir build/ci-ninja --output-on-failure
